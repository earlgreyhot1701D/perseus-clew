name: Deploy AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install infra dependencies
        run: npm ci
        working-directory: infra

      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never -c environment=${{ github.event.inputs.environment }}
        working-directory: infra

      - name: Smoke test
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name PerseusClew-Compute-${{ github.event.inputs.environment }} --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: health endpoint returned $STATUS"
            exit 1
          fi
          echo "Smoke test passed: $API_URL/health returned 200"
