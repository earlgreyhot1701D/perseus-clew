services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - AWS_REGION=us-west-2
      - PERSEUS_USER_AGENT=Agentis Lux/0.1-dev (+http://localhost:3000)
      - CACHE_TTL_MINUTES=15
      - BEDROCK_MODEL_ID=claude-haiku-4-5-20251001
      - LOG_LEVEL=debug
      - MOCK_BEDROCK=true
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_SCAN_RESULTS_TABLE=PerseusClew-ScanResults
      - DYNAMODB_SCAN_CACHE_TABLE=PerseusClew-ScanCache
    depends_on:
      - dynamodb-local

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
